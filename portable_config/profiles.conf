##⇘⇘ Basic Instructions:

This is a secondary configuration file, a collection of profiles (see https://mpv.io/manual/master/#profiles).
Parameters in the general section of "mpv.conf" will be overridden by activated profiles.
This file only works if specified via the --include parameter in your main "mpv.conf".
[xxx] defines the header of a profile group; commenting out a group requires commenting out both the header and the parameters.
####################

Regular Profiles
####################
##⇘⇘ Regular profiles do not have auto-trigger conditions.

They can be activated in the main config using --profile=<name> or via keybindings.
[pure]
profile-desc  = Pure Mode (Back to Basics)
brightness    = 0
contrast      = 0
saturation    = 0
gamma         = 0
hue           = 0
dither-depth  = no
gpu-dumb-mode = yes # Enable this to disable many --vo=gpu features (including the three below)
#glsl-shaders  = ""
#deband         = no
#sharpen        = 0
vf            = ""
speed         = 1

##⇘⇘ Can be used to revert changes from scripts like script-binding input_plus/pip_dummy

Note: Using keybindings in input.conf is often more reliable for window state management.
[window_reset]
profile-desc       = Reset Window State
fullscreen          = no
border              = yes
title-bar           = yes
window-scale        = 1
auto-window-resize  = yes
keepaspect-window   = yes
ontop               = no

[DeBand+]
profile-desc        = Custom Debanding
deband              = yes
deband-iterations   = 3    # <0-16> Number of deband steps. Higher is stronger but heavier. Values >4 have diminishing returns.
deband-threshold    = 42   # <0-4096> Filter threshold. Higher increases strength but may lose fine detail (Default: 48).
deband-range        = 12   # <1-64> Initial radius. Larger values are stronger but more intensive.
deband-grain        = 24   # <0-4096> Extra dynamic noise to mask remaining artifacts (Set to 0 if using static noise shaders).
#glsl-shaders-append = "~~/shaders/noise_static_chroma.glsl"
#glsl-shaders-append = "~~/shaders/noise_static_luma.glsl"

##⇘⇘ Alternative Software Scaler Profiles

Used when mpv needs to perform internal format conversions.
[SWscaler]
profile-desc               = Software Scaler
#sws-allow-zimg             = no              # Prefer zimg over libswscale. Default: yes.
sws-scaler                 = bicublin        # [libswscale] Scaling algorithm for luma/chroma.
#sws-fast                   = yes             # [libswscale] Optimize performance at the cost of quality.
#zimg-scaler-chroma         = bicubic         # [zimg] Chroma scaling algorithm.
zimg-scaler                = bicubic         # [zimg] Luma scaling algorithm.
zimg-scaler-param-a        = 1/3             # [zimg] Scaling algorithm sub-parameter.
zimg-scaler-param-b        = 1/3
#zimg-dither                = error-diffusion # [zimg] Dithering algorithm.
zimg-fast                  = no              # [zimg] Optimize performance at the cost of quality.

#########################

Conditional Profiles
#########################
##⇘⇘ Triggered automatically based on properties.

Removing --profile-cond and --profile-restore turns these into regular profiles.
##⇘⇘ HDR to SDR (Static Tone Mapping)

Use this if your GPU does not support --hdr-compute-peak.
[H2S-STM]
profile-desc           = HDR to SDR (Static Tone Mapping)
#profile-cond           = p["video-params/sig-peak"]>1
profile-restore        = copy
target-peak            = 100        # <10-10000> Lower values result in a brighter image. Default: 203.
hdr-compute-peak       = no         # Scene-based dynamic tone mapping.
tone-mapping           = hable      # Tone mapping algorithm.
tone-mapping-max-boost = 1.0        # <1.0-10.0> Overexposure index.
gamut-mapping-mode     = desaturate # Gamut clipping/mapping method after tone mapping.

##⇘⇘ HDR to SDR (Dynamic Tone Mapping - Basic Version)

[H2S-DTM]
profile-desc             = HDR to SDR (Dynamic Tone Mapping)
profile-cond             = p["video-params/sig-peak"]>1
profile-restore          = copy
#target-peak              = auto
hdr-compute-peak         = yes
hdr-peak-percentile      = 99.8       # Ignore outliers in peak brightness.
hdr-peak-decay-rate      = 150        # Decay rate for peak detection.
hdr-scene-threshold-low  = 4          # Lower threshold for scene change detection.
hdr-scene-threshold-high = 16         # Upper threshold for scene change detection.
tone-mapping             = bt.2390
#tone-mapping-param       = default
tone-mapping-max-boost   = 1.5
gamut-mapping-mode       = clip

##⇘⇘ Automatically disable "Always on Top" when paused.

[ontop_playback]
profile-desc    = Disable Ontop when Paused
#profile-cond    = pause
profile-restore = copy
ontop           = no

##⇘⇘ Example of Filename Matching: Triggers when the filename contains "VCB-Studio".

Note: Lua escape character "%" is used for the hyphen "-".
[VCB-Studio]
profile-desc     = VCB-Studio Release
profile-cond     = filename:match("VCB%-Studio")
profile-restore  = copy
term-playing-msg = "LittlePox : SAYA is a lolicon !!!"

##⇘⇘ Profile for VapourSynth (.vpy) script previewing.

Designed to provide a clean environment for analyzing encoding results.
[EXT_vpy]
profile-desc        = VapourSynth Script Preview
profile-cond        = filename:match("%.vpy$")
profile-restore     = copy
demuxer-lavf-format = vapoursynth
profile             = pure         # Inherit 'pure' profile to disable processing
icc-profile         = ""
icc-profile-auto    = no
video-unscaled      = yes
video-sync          = desync
framedrop           = no
aid                 = no
audio-file-auto     = no
sid                 = no
sub-auto            = no
