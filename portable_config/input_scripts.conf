##⇘⇘ This file demonstrates (partial) binding syntax for scripts
## For all available custom commands, refer to the specific documentation of each script


#############
## LUA Scripts ##
#############

##⇘⇘ Built-in LUA scripts included with MPV

##⇓ (osc.lua)
 DEL                 script-binding osc/visibility          # Toggle visibility of the built-in OSC
 Alt+DEL             script-message osc-show                # Briefly show the built-in OSC

##⇓ (stats.lua)
 i                   script-binding display-stats           # Briefly show statistics (Use 0-5 to flip pages; Up/Down to scroll pages 2, 4, 5)
 I                   script-binding display-stats-toggle    # Toggle persistent statistics overlay
 k                   script-binding display-page-2          # Briefly show a specific stats page (Page 2)
 K                   script-binding display-page-2-toggle   # Toggle persistent display of a specific stats page

##⇓ (commands.lua)
## Built-in command and info display extension relying on console.lua
 `                   script-binding commands/open           # Open OSD Command Line (formerly "Console"; Esc to exit)

##⇓ (select.lua)
## Built-in multi-purpose script relying on console.lua for switching tracks, subs, etc.
## While the select menu is active, the following are remapped: DOWN/Ctrl+n (Next), UP/Ctrl+p (Prev), PGDWN/Ctrl+f (Page Down), PGUP/Ctrl+b (Page Up).
 g                   ignore
 g-m                 script-binding select/menu                   # Open main select menu
 g-p                 script-binding select/select-playlist        # Open select sub-menu: Playlist
 g-t                 script-binding select/select-track           # Open select sub-menu: Combined Track List
 g-S                 script-binding select/select-secondary-sid   # Open select sub-menu: Secondary Subtitle List
 g-r                 script-binding select/show-properties        # Open select sub-menu: Property List

 MBTN_MID            script-binding select/context-menu           # Summon mpv context menu (OSD version) [Middle-Click]

##⇓ (positioning.lua)
 Ctrl+MBTN_MID       script-binding positioning/align-to-cursor             # Move video (Snap to cursor)
 Ctrl+MBTN_LEFT      script-binding positioning/drag-to-pan                 # Move video (Drag)
 Ctrl+WHEEL_UP       script-binding positioning/cursor-centric-zoom  0.1    # Zoom In (Cursor-centric)
 Ctrl+WHEEL_DOWN     script-binding positioning/cursor-centric-zoom -0.1    # Zoom Out (Cursor-centric)

##⇘⇘ Additional bindings for external scripts. These will coexist with the scripts' internal defaults.
## Some script shortcuts can also be modified in their respective /script-opts/ config files.

##⇓ (input_plus.lua)
 Ctrl+a              script-binding input_plus/adevice_back             # Switch to previous audio device (within current --ao)
 m                   script-binding input_plus/mark_aid_fin             # Mark Audio: Mark A -> Mark B -> Merge -> Cancel
 Alt+p               script-binding input_plus/playlist_order_0         # Shuffle/Unshuffle playlist
 CLOSE_WIN           script-binding input_plus/quit_real                # Confirmation before quitting (Prevents accidental exit)
 Shift+RIGHT         script-binding input_plus/seek_acc                 # [Hold/Release] Non-linear forward seek (Streaming-style)
 b                   script-binding input_plus/speed_auto               # [Hold/Release] ↘ 2x Speed ↗ 1x Speed

##⇓ (save_global_props.lua)
 Ctrl+r              script-message-to save_global_props clean_data     # Clear recorded global property values

##⇓ (stats_mediainfo.lua)
 Alt+i               script-binding stats_mediainfo/display_toggle      # Toggle persistent MediaInfo-style stats
 Ctrl+i              script-binding stats_mediainfo/copy2clipboard      # Copy MediaInfo of current file to clipboard

##⇓ (thumbfast.lua)
 Ctrl+Alt+t          script-binding thumbfast/thumb_rerun               # Restart thumbnail engine (Fixes frozen previews)
 Ctrl+t              script-binding thumbfast/thumb_toggle              # Toggle thumbnail previews
 Ctrl+T              script-message thumb_hwdec toggle                  # Toggle hardware decoding for thumbnails

##⇓ (/uosc/)
 MBTN_RIGHT          script-binding uosc/menu                           # Summon uosc OSD context menu [Right-Click]
