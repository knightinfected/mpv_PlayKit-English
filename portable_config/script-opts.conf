## ⇘⇘ Basic Instructions:

## This is a secondary configuration file aimed at centrally managing script options: [https://github.com/hooke007/mpv_PlayKit/discussions/126](https://github.com/hooke007/mpv_PlayKit/discussions/126)

## Parameters already present in the main configuration file will be overwritten by this file, and it will also override parameters of the same name in the `script-opts` folder.

## This file only takes effect if specified via the `--include` option in the main configuration file "mpv.conf".

## ⇘ Built-in Scripts

##########

# Console

##########

## The reading mechanism for certain options in this script is slightly special (it detects the platform to force-override presets within the script, then reads user settings to override those). Therefore, if you wish to use default values, do not explicitly specify the `font` and `case_sensitive` options (see: [https://github.com/mpv-player/mpv/blob/ae3420fe6674295cc732933332336cdb3afd81ec/player/lua/console.lua#L125-L144](https://github.com/mpv-player/mpv/blob/ae3420fe6674295cc732933332336cdb3afd81ec/player/lua/console.lua#L125-L144)).

## The following settings are actually used for another built-in script: #OSD Command Line#

script-opts-append = console-font=
# Specifies the console font. Default is empty (system default).
script-opts-append = console-font_size=24              # Font size. Default: 24
script-opts-append = console-border_size=1.65          # Font border width. Default: 1.65
script-opts-append = console-margin_x=-1               # Left and bottom margins (-1 means same as mpv option --osd-margin-x)
script-opts-append = console-margin_y=-1
script-opts-append = console-scale_with_window=auto    # <yes|no|auto(default)> Whether to scale the console with window height. "auto" follows --osd-scale-by-window.

script-opts-append = console-history_dedup=yes         # Remove duplicate entries in history, keeping only the latest. Default: yes
script-opts-append = console-font_hw_ratio=auto        # Font height-to-width ratio, affects "completion hint area" size (suggested: 1.8~2.5). Default: auto

## The following settings are actually used for another built-in script: #Selector#

script-opts-append = console-exact_match=no            # <no|yes> Enable exact search matching. Use a single quote (') before a query to enable temporarily.
script-opts-append = console-case_sensitive=no         # <no|yes> Case sensitive (for exact matching).
script-opts-append = console-background_alpha=80       # <0-255> Transparency of the select menu background. Default: 80
script-opts-append = console-gap=0.2                   # Spacing between select menu items.
script-opts-append = console-padding=10                # Select menu padding.
script-opts-append = console-menu_outline_size=0       # Select menu border thickness.
script-opts-append = console-menu_outline_color="#FFFFFF" # Select menu border color ("#RRGGBB").
script-opts-append = console-corner_radius=8           # Select menu corner radius.
script-opts-append = console-selected_color="#222222"  # Color of the selected item.
script-opts-append = console-selected_back_color="#FFFFFF" # Background color of the selected item.
script-opts-append = console-match_color="#0088FF"     # Color for matching strings.

#############

# OSD Command Line

#############

## Extension script dependent on #Console#

script-opts-append = commands-persist_history=no       # Persist history (whether to keep command history). Default: no
script-opts-append = commands-history_path=~~state/command_history.txt
# Path for history cache.
script-opts-append = commands-remember_input=yes       # Whether to keep current input text when closing the console. Default: yes

##########

# Selector

##########

## Extension script dependent on #Console#

## See #Console# options above for some style customizations.

script-opts-append = select-history_date_format=%Y-%m-%d %H:%M:%S
# Date format for history items (passed to Lua's `os.date`).
script-opts-append = select-hide_history_duplicates=yes    # Show only the last entry for items with the same path. Default: yes

script-opts-append = select-menu_conf_path=~~/menu.conf    # Path to read context menu definitions.
script-opts-append = select-max_playlist_items=25          # Max number of playlist items in the context menu.
script-opts-append = select-populate_menu_data=yes         # Generate menu items based on menu.conf content.

#######################

# Context Menu (OSD)

#######################

## Extension script dependent on #Selector#

script-opts-append = context_menu=-font_size=14                    # Font size
script-opts-append = context_menu=-gap=0.2                         # Spacing between menu items
script-opts-append = context_menu=-padding_x=8
script-opts-append = context_menu=-padding_y=4                     # Horizontal and vertical padding for menu items
script-opts-append = context_menu=-menu_outline_size=0
script-opts-append = context_menu=-menu_outline_color=#FFFFFF      # Border thickness and color
script-opts-append = context_menu=-corner_radius=5                  # Corner radius
script-opts-append = context_menu=-scale_with_window=auto          # <no|yes|auto> Scale menu with window height
script-opts-append = context_menu=-focused_color=#222222
script-opts-append = context_menu=-focused_back_color=#FFFFFF      # Color/background of focused item
script-opts-append = context_menu=-disabled_color=#555555          # Color of disabled items and separators
script-opts-append = context_menu=-seconds_to_open_submenus=0.2
script-opts-append = context_menu=-seconds_to_close_submenus=0.2   # Delay for opening/closing submenus

################

# On-Screen Controller (OSC)

################

script-opts-append = osc-showwindowed=yes                  # Show OSC when windowed. Default: yes
script-opts-append = osc-showfullscreen=yes                # Show OSC when fullscreen. Default: yes
script-opts-append = osc-showidlescreen=yes                # Show logo/idle info. Default: yes
script-opts-append = osc-scalewindowed=1                   # OSC scale factor when windowed. Default: 1
script-opts-append = osc-scalefullscreen=1                 # OSC scale factor when fullscreen. Default: 1
script-opts-append = osc-vidscale=auto                     # <no|yes|auto> Scale OSC with video size? "auto" syncs with --osd-scale-by-window.
script-opts-append = osc-valign=0.8                        # Vertical alignment <-1 (top) to 1 (bottom)>. Default: 0.8
script-opts-append = osc-halign=0                          # Horizontal alignment <-1 (left) to 1 (right)>. Default: 0
script-opts-append = osc-barmargin=0                       # Margin for "bottombar/topbar" layouts.
script-opts-append = osc-boxalpha=80                       # <0 (opaque) - 255 (transparent)> Alpha for box elements. Default: 80

script-opts-append = osc-hidetimeout=500                   # Duration (ms) before OSC hides if mouse is still. Default: 500
script-opts-append = osc-fadeduration=200                  # Fade-out duration (ms). Default: 200 (0 for no animation)
script-opts-append = osc-fadein=no                          # Enable fade-in effect.
script-opts-append = osc-deadzonesize=0.5                  # <0.0--1.0> Mouse interaction zone for OSC visibility. Default: 0.5
script-opts-append = osc-minmousemove=0                    # Min pixels mouse must move to show OSC. Default: 0

script-opts-append = osc-layout=bottombar                  # <box|slimbox|bottombar(default)|topbar|slimbottombar|slimtopbar>
script-opts-append = osc-seekbarstyle=bar                  # <bar(default)|diamond|knob> Seekbar style.
script-opts-append = osc-seekbarhandlesize=0.6             # Size of diamond/knob relative to seekbar height. Default: 0.6
script-opts-append = osc-seekrangestyle=inverted           # <bar|line|slider|inverted(default)|none> Seek range style.
script-opts-append = osc-seekrangeseparate=yes             # Separate seekrange from seekbar (when style=bar). Default: yes
script-opts-append = osc-seekrangealpha=200                # <0-255> Seekrange transparency. Default: 200
script-opts-append = osc-seekbarkeyframes=yes              # Use keyframes for seekbar dragging. Default: yes (no for exact/slow seek)
script-opts-append = osc-scrollcontrols=yes                # Allow mouse wheel interaction on elements. Default: yes

script-opts-append = osc-title=${!playlist-count==1:[${playlist-pos-1}/${playlist-count}] }${media-title}
# OSC Title using property expansion (e.g., volume, speed, playlist info).
# Note: Too many variables may impact performance.

script-opts-append = osc-tooltipborder=1                   # Tooltip border in bar layouts. Default: 1
script-opts-append = osc-timetotal=no                      # Show total time instead of remaining time. Default: no
script-opts-append = osc-remaining_playtime=yes            # Show remaining time based on playback speed. Default: yes
script-opts-append = osc-timems=no                         # Show timecode with millisecond precision. Default: no
script-opts-append = osc-tcspace=100                       # Timecode spacing (font compensation). Default: 100
script-opts-append = osc-visibility=auto                   # <never|auto(default)|always> OSC visibility.
script-opts-append = osc-visibility_modes=never_auto_always
# Cycle order for `script-message-to osc visibility`.

script-opts-append = osc-boxmaxchars=80                    # Max title characters in "box" layout. Default: 80
script-opts-append = osc-boxvideo=no                       # OSC/Video layout interaction.
script-opts-append = osc-windowcontrols=auto               # Window controls in borderless mode.
script-opts-append = osc-windowcontrols_alignment=right    # <left|right(default)>
script-opts-append = osc-windowcontrols_title=${media-title} # Top title in borderless mode.
script-opts-append = osc-greenandgrumpy=no                 # Disable holiday easter eggs. Default: no
script-opts-append = osc-livemarkers=yes                   # Live update chapter markers. Default: yes

script-opts-append = osc-chapter_fmt=Chapter: %s           # Hover format for chapters on seekbar. "no" to disable.
script-opts-append = osc-unicodeminus=no                   # Use Unicode minus character. Default: no

## Element Color Styles

script-opts-append = osc-background_color=#000000
script-opts-append = osc-timecode_color=#FFFFFF
script-opts-append = osc-title_color=#FFFFFF
script-opts-append = osc-time_pos_color=#FFFFFF
script-opts-append = osc-buttons_color=#FFFFFF
script-opts-append = osc-held_element_color=#999999
script-opts-append = osc-time_pos_outline_color=#000000

script-opts-append = osc-tick_delay=1/60                   # Min OSC render interval (seconds).
script-opts-append = osc-tick_delay_follow_display_fps=no  # Sync OSC render with display refresh rate.

## Custom Commands for Buttons (Mbtn_left/mid/right, Wheel_up/down)

# (Mappings for menu, playlist, title/stats, play/pause, chapters, audio/sub tracks, volume, and fullscreen)

# Example: Left-click menu button to show select menu and hide OSC.

##########

# Positioner

##########

script-opts-append = positioning-toggle_align_to_cursor=no   # If 'no', drag to pan. If 'yes', click to follow cursor, click again to stop.
script-opts-append = positioning-suppress_osd=no             # Suppress OSD zoom value output when using cursor-centric-zoom.

############

# Stats

############

## Dynamic Keybindings (Info pages 1, 2, 3, 4, 5, 0; Supports scrolling and searching)

script-opts-append = stats-key_page_1=1
script-opts-append = stats-key_page_2=2
script-opts-append = stats-key_page_3=3
script-opts-append = stats-key_page_4=4
script-opts-append = stats-key_page_5=5
script-opts-append = stats-key_page_0=0
script-opts-append = stats-key_scroll_up=UP
script-opts-append = stats-key_scroll_down=DOWN
script-opts-append = stats-key_search=/
script-opts-append = stats-key_exit=ESC

script-opts-append = stats-duration=4                    # Duration for temporary display (sec). Default: 4
script-opts-append = stats-redraw_delay=1                # Refresh interval for persistent display (sec). Default: 1
script-opts-append = stats-persistent_overlay=no         # Prevent other OSD text from covering stats. Default: no
script-opts-append = stats-show_frame_info=no            # Show current frame info. Default: no

## Plotting & Styles

script-opts-append = stats-plot_perfdata=no              # Show performance occupancy graph.
script-opts-append = stats-plot_cache=yes
script-opts-append = stats-plot_bg_color=262626
script-opts-append = stats-plot_color=FFFFFF

## Font Settings

script-opts-append = stats-font_mono=monospace           # Monospaced font recommended.
script-opts-append = stats-font_size=20                  # Font size.
script-opts-append = stats-alpha=11                      # Font transparency. Default: 11
script-opts-append = stats-vidscale=auto                 # Scale stats with video height.

## ASS vs No-ASS formatting (Indent, Bold, Italic settings)

# (Configuration for newlines, indentation, and text styling tags)

############

# YTDL (YouTube-DL)

############

script-opts-append = ytdl_hook-exclude=                  # URL Blacklist (Regex format).
script-opts-append = ytdl_hook-include=^%w+%.youtube%.com/|^youtube%.com/|^youtu%.be/|^%w+%.twitch%.tv/|^twitch%.tv/
# URL Whitelist.
script-opts-append = ytdl_hook-try_ytdl_first=no         # Try YTDL parsing before native. Default: no
script-opts-append = ytdl_hook-thumbnails=none           # <all|best|none> Add thumbnails as video tracks.
script-opts-append = ytdl_hook-ytdl_path=                # Path to yt-dlp.exe or youtube-dl.exe.

## ⇘ External Scripts

###########################

# fontconfig Auto-loader

###########################

script-opts-append = auto_load_fonts-compatible_mode=no    # Enable compatibility mode.
script-opts-append = auto_load_fonts-compatible_dir=~~/.fonts # Compatibility directory.

####################

# Save Global Props

####################

script-opts-append = save_global_props-save_mode=1                  # <1|2> Save timing: Quit / On Change.
script-opts-append = save_global_props-props=volume,mute           # Attributes to record (comma-separated).
script-opts-append = save_global_props-cache_dir=~~/               # Cache directory.

#########################

# Stats MediaInfo Edition

#########################

script-opts-append = stats_mediainfo-mediainfo_path=MediaInfo       # Path to MediaInfo CLI.
script-opts-append = stats_mediainfo-verbose=no                    # Full info output.
script-opts-append = stats_mediainfo-font_size=28                  # Main font size.
script-opts-append = stats_mediainfo-max_lines=22                  # Max lines per page.

################

# Thumbfast (Thumbnail Engine)

################

script-opts-append = thumbfast-max_height=320            # Thumbnail dimensions.
script-opts-append = thumbfast-max_width=320
script-opts-append = thumbfast-network=no                # Enable for streams.
script-opts-append = thumbfast-hwdec=yes                 # Hardware decoding for thumbnails.
script-opts-append = thumbfast-precise=0                 # <0|1|2> Precision: 0=Auto, 1=Keyframes, 2=Exact.
script-opts-append = thumbfast-quality=1                 # <1|2|3> 1=Fastest, 2=Better HDR, 3=Dolby Vision (Slow).

##################

# uosc (Multi-functional UI)

##################

script-opts-append = uosc-timeline_style=line            # Timeline style (line/bar).
script-opts-append = uosc-timeline_size=40               # Timeline height (px).
script-opts-append = uosc-progress=windowed               # When to show minimized progress bar.
script-opts-append = uosc-controls=menu,ST-stats_tog...  # Custom control buttons.
script-opts-append = uosc-volume=right                   # Volume control position (right/left/none).
script-opts-append = uosc-top_bar=no-border              # Top bar visibility (never/always/no-border).
script-opts-append = uosc-autoload=no                    # Auto-load next file in directory.
script-opts-append = uosc-video_types=avi,mkv,mp4...     # Extension filters for file browser.
script-opts-append = uosc-destination_time=total         # Time display: total / playtime-remaining / time-remaining.
