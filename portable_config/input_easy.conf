##⇘⇘ This file displays standard keybinding syntax
## You can also use the --input-conf option in mpv.conf to specify this file as the default
## View the list of active bindings on page 4 of the stats overlay (Shift+i)
## For rules on custom shortcuts, see https://hooke007.github.io/unofficial/mpv_input.html


##############
## General  ##
##############

##⇘⇘ Format: Key (required); Command (required); # Comment (optional)
## Note: If --no-input-builtin-bindings is used in the main config, you don't need to "ignore" unwanted keys
## Full default bindings: https://github.com/mpv-player/mpv/blob/master/etc/input.conf 
## Full manual: https://mpv.io/manual/master/#input-conf

##⇘⇘ Mouse

 MBTN_RIGHT            context-menu                 # Summon mpv context menu (GUI) [Right-Click]

 MBTN_LEFT             ignore                       # <No Operation> [Left-Click]
 MBTN_LEFT_DBL        cycle fullscreen             # Toggle Fullscreen [Left-Double-Click]
 MBTN_BACK            playlist-prev                # Previous file in playlist [Back Button]
 MBTN_FORWARD         playlist-next                # Next file in playlist [Forward Button]
#MBTN_MID             ignore                       # Common for custom use, clear the next two if used [Middle-Click]

 WHEEL_UP             seek -10                     # Seek backward 10s [Wheel-Up]
 WHEEL_DOWN           seek  10                     # Seek forward 10s [Wheel-Down]
#WHEEL_LEFT           ignore                       # <No Operation> [Wheel-Left]
#WHEEL_RIGHT          ignore                       # <No Operation> [Wheel-Right]

##⇘⇘ Keyboard

 Ctrl+v               loadfile ${clipboard/text}   # Open URL from clipboard

 q                    quit                         # Exit MPV
 Q                    quit-watch-later             # Exit and save playback position
 o                    show-progress                # Briefly show progress/timecodes
 O                    no-osd cycle-values osd-level 3 1 # Toggle persistent timecode display

 1                    add contrast -0.5              # Contrast -
 2                    add contrast  0.5              # Contrast +
 3                    add brightness -0.5            # Brightness -
 4                    add brightness  0.5            # Brightness +
 5                    add gamma -0.5                 # Gamma -
 6                    add gamma  0.5                 # Gamma +
 7                    add saturation -0.5            # Saturation -
 8                    add saturation  0.5            # Saturation +
 9                    add hue -0.5                   # Hue -
 0                    add hue  0.5                   # Hue +
 Ctrl+BS              set contrast 0 ; set brightness 0 ; set gamma 0 ; set saturation 0 ; set hue 0 # Reset Video EQ

## Note: Vertical orientation follows output rotation. Rotation triggers thumbnail rebuild.
## Rotation may cause chroma upscaling bugs; fix via --cscale=bilinear or debanding/software decoding.
 Ctrl+LEFT            cycle-values video-rotate "0" "270" "180" "90" # Rotate 90° Counter-Clockwise
 Ctrl+RIGHT           cycle-values video-rotate "0" "90" "180" "270" # Rotate 90° Clockwise

 Alt+0                cycle-values current-window-scale "0.5" "1.0" "1.5" # Quick window scaling
 Alt+`                set current-window-scale  1.0    # Reset window to 1x scale
 Alt+1                add current-window-scale -0.1    # Window Scale -
 Alt+2                add current-window-scale  0.1    # Window Scale +
 Alt+9                cycle-values panscan "0.0" "1.0" # Pan-and-scan (fit/fill)
 Alt+-                add video-zoom  -0.1           # Video Zoom - (window stays same)
 Alt+=                add video-zoom   0.1           # Video Zoom + (window stays same)
 Alt+LEFT             add video-pan-x -0.1           # Move Video Left
 Alt+RIGHT            add video-pan-x  0.1           # Move Video Right
 Alt+UP               add video-pan-y -0.1           # Move Video Up
 Alt+DOWN             add video-pan-y  0.1           # Move Video Down
 Alt+BS               set video-zoom 0 ; set video-pan-x 0 ; set video-pan-y 0 # Reset Video Pan/Zoom
 Alt+b                cycle border                   # Toggle Window Border

 V                    cycle video                  # Cycle Video Tracks
 SPACE                cycle pause                  # Toggle Play/Pause [Space]
 Ctrl+Alt+SPACE       stop                         # Stop Playback
 T                    cycle ontop                  # Toggle Stay-on-Top
 t                    set ontop yes                # Enable Stay-on-Top
 f                    cycle fullscreen             # Toggle Fullscreen
 ENTER                set fullscreen yes           # Enter Fullscreen [Enter]
 ESC                  set fullscreen no            # Exit Fullscreen [Esc]
 l                    ab-loop                      # Set/Clear A-B Loop points
 L                    cycle-values loop-file "inf" "no" # Toggle File Looping
 ,                    frame-back-step              # Step backward one frame (paused)
 .                    frame-step                   # Step forward one frame (paused)
 Ctrl+,               add chapter -1               # Previous Chapter
 Ctrl+.               add chapter  1               # Next Chapter
 <                    playlist-prev                # Previous file in playlist
 >                    playlist-next                # Next file in playlist
 LEFT                 seek -5                      # Seek backward 5s [Left Arrow]
 Shift+LEFT           seek -1 exact                # Seek backward 1s (Exact)
 RIGHT                seek  5                      # Seek forward 5s [Right Arrow]
 Shift+RIGHT          seek  1 exact                # Seek forward 1s (Exact)
 UP                   sub-seek -1                  # Seek to previous subtitle [Up Arrow]
 DOWN                 sub-seek  1                  # Seek to next subtitle [Down Arrow]
 [                    add speed -0.1               # Speed - (min 0.01)
 ]                    add speed  0.1               # Speed + (max 100)
 {                    multiply speed 0.5           # Speed x0.5
 }                    multiply speed 2.0           # Speed x2.0
 BS                   set speed 1.0                # Reset playback speed [Backspace]

 d                    cycle deinterlace            # Toggle Deinterlacing
 D                    cycle deband                 # Toggle Debanding
 j                    add sharpen -0.1             # Sharpening - (min -1)
 k                    add sharpen  0.1             # Sharpening + (max 1)
 Ctrl+h               cycle-values hwdec "auto" "auto-copy" "no" # Toggle Hardware Decoding (Auto/Copy/Off)
 P                    cycle correct-pts            # Toggle PTS Parsing Mode

## Cycle audio devices. Get names via FAQ or manual: https://mpv.io/manual/master/#options-audio-device
#A                   cycle-values audio-device "wasapi/{guid}" "wasapi/{guid}"
 -                    add volume -1                # Volume -
 =                    add volume  1                # Volume +
 m                    cycle mute                   # Toggle Mute
 Alt+c                add aid -1                   # Previous Audio Track
 Alt+v                add aid  1                   # Next Audio Track
 c                    add audio-delay -0.1         # Audio Sync -100ms
 v                    add audio-delay  0.1         # Audio Sync +100ms
 z                    add sub-delay -0.1           # Subtitle Sync -100ms
 x                    add sub-delay +0.1           # Subtitle Sync +100ms
 Shift+BS             set audio-delay 0 ; set sub-delay 0 # Reset Audio/Sub Sync
 Z                    add sub-scale -0.1           # Subtitle Scale -
 X                    add sub-scale +0.1           # Subtitle Scale +
 Ctrl+z               add sub-pos -1               # Move Subtitles Up
 Ctrl+x               add sub-pos +1               # Move Subtitles Down
 Alt+z                add sid -1                   # Previous Subtitle Track
 Alt+x                add sid  1                   # Next Subtitle Track
 Alt+Z                add secondary-sid -1         # Previous Secondary Subtitle (Native)
 Alt+X                add secondary-sid  1         # Next Secondary Subtitle (Native)
## For dual sub implementation info: https://github.com/hooke007/mpv_PlayKit/discussions/61
 Ctrl+Alt+z           cycle sub-ass-vsfilter-blur-compat
## Toggle if ASS subtitles show abnormal stretching/deformation

 s                    screenshot                   # Screenshot (with subs, no OSD) - Original Res
 S                    screenshot video             # Screenshot (no subs, no OSD) - Original Res
 Ctrl+s               screenshot window            # Screenshot (with subs, with OSD) - Screen Res
 Alt+s                screenshot each-frame        # Toggle Frame-by-Frame Screenshot
## Repeat Alt+s to stop. "video" or "window" can be added after "each-frame". 
## Use --framedrop=no in mpv.conf to avoid duplicates/missed frames.
