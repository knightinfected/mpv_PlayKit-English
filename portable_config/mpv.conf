##⇘⇘ Basic Instructions:
## There is no need to include parameters that are identical to default values; they are listed here for demonstration.
## Lines starting with "#" are commented out (ignored by mpv).
## Notation: # <Optional Values> [Requirements] Parameter description (Additional notes).
## Some options are interdependent. MPV reads the config from top to bottom, so order matters for general parameters.

 input-conf       =                          # Use a specific file for keybindings. Default empty, e.g., "~~/input_easy.conf"
 include          =                          # Path to an additional config file to read. Default empty, e.g., "~~/profiles.conf"
 use-filedir-conf = no                       # Allow loading file-specific config files from the video's directory.
 log-file         =                          # Path to save the log file. Default empty, e.g., "~~desktop/mpv-lazy.log"

 ########
 # Base #
 ########

 vo                 = gpu-next       # <gpu-next|gpu> Video output driver. Recommended: gpu-next.
                                     # gpu-next supports modern features like Dolby Vision and is under active development.
 gpu-context        = d3d11          # <win|d3d11|winvk> Graphics backend. Default: auto.
                                     # Windows & NVIDIA users should generally use d3d11. 
 d3d11-exclusive-fs = no             # [If --gpu-api=d3d11] Exclusive fullscreen mode.
 d3d11-flip          = yes            # Set to 'no' to fix freezing issues when using --on-top and exclusive fullscreen.

 hwdec               = no             # Hardware decoding API. 'no' for software decoding.
                                     # 'auto' or 'auto-safe' (alias 'yes') tries native hardware decoding.
                                     # Can be a priority list, e.g., "vulkan-copy,nvdec-copy,dxva2-copy".
 hwdec-codecs        = "h264,vc1,hevc,vp8,vp9,av1,prores,ffv1"
                                     # Codecs allowed for hardware decoding. 'all' for everything.
 vd-lavc-dr          = auto           # <auto|yes|no> Direct rendering to GPU memory. Disable if decoding is slow on low-end Intel CPUs.

##⇘⇘ Dual-GPU Laptop Handling

 d3d11-adapter       =
                                     # [If --gpu-api=d3d11] Specify which GPU to use for rendering. 
                                     # Default empty (system default). Example: "NVIDIA GeForce RTX 2070 Super".
                                     # Supports partial matches like "NV" or "NVIDIA".
 vulkan-device       =
                                     # [If --gpu-api=vulkan] Specify GPU for Vulkan. 
                                     # Default empty. Example: "NVIDIA GeForce RTX 2070 Super" (Must use full name or UUID).

 ########
 # Features #
 ########

##⇘⇘ General Features
 idle                   = no          # <yes|no|once> Stay running after the file ends or playback is stopped.
 input-ipc-server       =
                                      # Path for IPC socket/pipe. Default empty. 
                                      # Example for SVP Manager: "mpvpipe".
 input-builtin-bindings = yes         # Use mpv's default keybindings.
 input-default-bindings = yes         # Use weak keybindings from scripts.

 pause                  = no          # Start in a paused state.
 panscan                = 0.0         # <0.0-1.0> Zoom/Pan-and-scan. 1.0 removes black bars by cropping video.
 loop                   = no          # <inf|no> Loop current file.
 loop-playlist          = no          # <inf|force|no> Loop playlist. 'force' includes failed entries.
 hr-seek-framedrop      = yes         # Allow dropping frames during seeks. Recommended 'no' for interpolation.
 save-position-on-quit  = no          # Save playback position and state on exit.
 watch-later-options    = start,speed,edition,volume,mute,audio-delay,gamma,brightness,contrast,saturation,hue,deinterlace,vf,af,panscan,aid,vid,sid,sub-delay,sub-speed,sub-pos,sub-visibility,sub-scale,sub-use-margins,sub-ass-force-margins,sub-ass-use-video-data,sub-ass-override,secondary-sub-visibility,ab-loop-a,ab-loop-b,video-aspect-override,video-aspect-method,video-unscaled,video-pan-x,video-pan-y,video-rotate,video-crop,video-zoom,video-scale-x,video-scale-y,video-align-x,video-align-y
                                      # Whitelist of properties to save. Recommended: "start,aid,vid,sid".

##⇘⇘ HDR Signaling and SDR Mapping
 target-colorspace-hint        = auto           # <auto|yes|no> Automatically switch display target color space.
 target-colorspace-hint-mode   = target         # <target|source|source-dynamic> Metadata mode for switching. 
                                                # Use 'source' for passthrough.
 target-colorspace-hint-strict = yes            # <yes|no> Respect --target-* options when hint is enabled.

##⇘⇘ Autoload replacement (similar to autoload.lua)
 autocreate-playlist    = no          # <no|filter|same> Automatically add files in the same directory to playlist.
                                      # 'filter' uses extension options; 'same' uses files with the same extension.
 directory-mode         = auto        # <auto|lazy|recursive|ignore> How to handle sub-directories.
 directory-filter-types = video,audio,image,archive,playlist
                                      # Types allowed for playlist population.
 video-exts             = 3g2,3gp,avi,flv,m2ts,m4v,mj2,mkv,mov,mp4,mpeg,mpg,ogv,rmvb,ts,webm,wmv,y4m
 image-exts             = avif,bmp,gif,heic,heif,j2k,jp2,jpeg,jpg,jxl,png,qoi,svg,tga,tif,tiff,webp
 audio-exts             = aac,ac3,aiff,ape,au,dts,eac3,flac,m4a,mka,mp3,oga,ogg,ogm,opus,thd,wav,wav,wma,wv

##⇘⇘ Window Settings
 fs                     = no          # Start in fullscreen.
 keep-open              = no          # <yes|no|always> Do not exit when playback ends.
 ontop                  = no          # Keep window always on top.
 title-bar              = yes         # Show OS window decorations (border/title bar).
 geometry               =             # Initial position or size (e.g., "1280x720" or "50%x50%").
 auto-window-resize     = yes         # Allow window to resize to video size.
 autofit-larger         =             # Max window size (e.g., "80%x80%").
 autofit-smaller        =             # Min window size (e.g., "40%x40%").
 keepaspect-window      = yes         # Force window to keep video aspect ratio when resizing.
 hidpi-window-scale     = no          # Perform HiDPI scaling (recommended 'no' for predictable sizing).

##⇘⇘ Cache Settings
 cache                  = auto        # <yes|no|auto> Enable network/file cache in RAM.
 demuxer-max-bytes      = 150MiB      # Cache size for network video.
 icc-cache              = yes         # Store ICC 3DLUT cache on disk.
 icc-cache-dir          =             # ICC cache directory. Default: "~~/cache".
 gpu-shader-cache       = yes         # Store GLSL shader compilation cache.
 gpu-shader-cache-dir   =             # Shader cache directory.
 watch-later-dir        =             # Directory for "watch later" files.

 #######
 # OSD #
 #######
 osd-on-seek              = bar          # <no|bar|msg|msg-bar> Information to show on seek.
 osd-duration              = 1000         # OSD duration in ms.
 osd-font                  = "sans-serif" # OSD font.
 osd-font-size             = 30           # OSD font size.
 osd-playing-msg           =              # Message shown at start of file (e.g., "${filename}").
 osd-playing-msg-duration  = 0            # Start message duration (0 = use global duration).
 osd-bar-align-y           = 0.5          # OSD bar vertical position (-1 to 1).
 osd-bar-w                 = 75           # OSD bar width (% of screen).
 osd-bar-h                 = 3.125        # OSD bar height (% of screen).
 osd-blur                  = 0            # OSD Gaussian blur.
 osd-outline-color         = "#FF000000"  # OSD outline color (AARRGGBB).
 osd-outline-size          = 1.65         # OSD outline size.
 osd-color                 = "#FFFFFFFF"  # OSD text color.
 osd-fractions             = no           # Show OSD time with millisecond precision.

 ########
 # Audio #
 ########
 ao                     = wasapi       # Audio output driver. WASAPI preferred for Win10.
 audio-device           = auto         # Specific audio device ID or name.
 audio-exclusive        = no           # Exclusive audio mode (blocks other apps).
 volume                 = 100          # Startup volume.
 volume-max             = 130          # Max volume (100-1000).
 audio-channels         = auto-safe    # Channel layout. Use 'stereo' to force downmix.
 audio-pitch-correction = yes          # Correct pitch when changing speed.
 alang                  =              # Preferred audio languages (e.g., "eng,en").
 audio-file-auto        = no           # <no|exact|fuzzy|all> Autoload external audio tracks.

 ########
 # Video #
 ########

##⇘⇘ Sync Mode
 video-sync                  = audio           # Sync to audio (best compatibility). 'display-resample' for judder reduction.
 video-sync-max-video-change = 1               # Threshold to disable display-sync if speed difference is too high.
 interpolation               = no              # [Requires video-sync=display-*] Reduce judder.
 tscale                      = oversample      # Temporal interpolation algorithm (Smooth motion).

##⇘⇘ Quality and Scaling
 cscale                       =                # Chroma upscaling. Defaults to --scale.
 scale                        = lanczos        # Upscaling algorithm.
 dscale                       = hermite        # Downscaling algorithm.
 linear-upscaling             = no             # Upscale in linear light (Requires >=16-bit FBO).
 sigmoid-upscaling            = yes            # Non-linear color conversion to avoid ringing.
 linear-downscaling           = yes            # Downscale in linear light (improves contrast).
 correct-downscaling          = yes            # Reduce aliasing during downscaling.
 dither-depth                 = auto           # Dithering bit depth. Match your display bit depth.
 dither                       = fruit          # <fruit|ordered|error-diffusion|no> Dithering algorithm.
 deband                       = no             # Reduce banding artifacts.
#profile                      = DeBand+        # Alternative debanding profile.

##⇘⇘ Color Management
 icc-profile-auto             = no             # Load system ICC profile.
 icc-profile                  =                # Manual ICC profile path.
 icc-3dlut-size               = auto           # Size of generated 3D LUT (e.g., 64).
 icc-force-contrast           = no             # Override ICC static contrast (e.g., 1000 for LCD).
 target-prim                  = auto           # [If no ICC] Display color space (e.g., "adobe", "display-p3").
 target-trc                   = auto           # [If no ICC] Display transfer characteristics (e.g., "gamma2.2").

 ####################
 # Scripts & Filters #
 ####################

## Built-in Scripts
 load-stats-overlay      = yes  # Statistics overlay.
 load-console            = yes  # Command console.
 load-commands           = yes  # OSD command line.
 load-select             = yes  # Feature list/selection UI.
 load-context-menu       = no   # OSD context menu (Default 'no' on Win as native is used).
 load-positioning        = yes  # Image positioning helper.
 load-auto-profiles      = auto # Conditional profiles.
 osc                     = yes  # On-screen controller.
 ytdl                    = yes  # YouTube-DL integration.

## External Scripts
 load-scripts = yes # Load everything from /scripts/ folder.
 scripts      = "~~/scripts/xxxxx.lua;~~/scripts/yyyyy.lua" # Manual script loading.

## Filters
 vf        = vflip
 vf-append = hflip
 vf-append = format=rotate=90

## Shaders (GLSL)
 glsl-shaders            = "~~/shaders/hooks_01.glsl;~~/shaders/hooks_02.glsl"
 glsl-shaders-append     = "~~/shaders/hooks_03.glsl"
 glsl-shader-opts-append = "hooks_01/param1=value1"

 ########
 # Subs #
 ########
 sub-auto                       = exact        # <no|exact|fuzzy|all> Autoload subtitle files.
 sub-file-paths                 =              # Extra directories for subs (e.g., "sub;subtitles").
 sub-codepage                   = auto         # Text subtitle encoding (e.g., "GB18030").
 slang                          =              # Preferred subtitle languages.
 subs-fallback                  = default      # Behavior if slang doesn't match.
 blend-subtitles                = no           # <yes|video|no> Blend subs into video frame before interpolation/color management.
 sub-hdr-peak                   = sdr          # White point for text subs in HDR output.
 sub-font-provider              = auto         # Font engine.

## Text Subs (SRT/LRC)
 sub-font                       = "sans-serif" # Subtitle font name.
 sub-font-size                  = 38           # Subtitle size.
 sub-color                      = "#FFFFFFFF"  # Text color.
 sub-use-margins                = yes          # Place subs in black bars if available.

## Advanced Subs (SSA/ASS)
 sub-ass-override                = scale        # <no|yes|scale|force|strip> Override ASS styles.
 sub-ass-scale-with-window       = no           # Scale subs with window size instead of video.
 embeddedfonts                   = yes          # Use fonts embedded in MKV.
 sub-ass-force-margins           = no           # Try to place ASS subs in black bars.

## VSFilter Compatibility
 sub-ass-use-video-data          = all          # Video stream info passed to libass.
 sub-ass-vsfilter-color-compat  = basic        # VSFilter color compatibility.

## Image Subs (IDX/SUP)
 image-subs-hdr-peak            = sdr          # Graphics subs brightness in HDR.
 stretch-image-subs-to-screen   = no           # Stretch PGS to screen (may allow black bar placement).

 ########
 # Screenshot #
 ########
 screenshot-format               = jpg          # <jpg|png|webp|jxl|avif>
 screenshot-jpeg-quality         = 90           # Quality (0-100).
 screenshot-png-compression      = 7            # Compression (0-9).
 screenshot-tag-colorspace       = yes          # Tag screenshot with color space.
 screenshot-high-bit-depth       = yes          # Use high bit depth for screenshots.
 screenshot-template             = "mpv-shot%n" # Naming template.
 screenshot-dir                  =              # Output directory (e.g., "~~desktop/").
