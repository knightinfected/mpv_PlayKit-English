##⇘⇘ This file demonstrates binding syntax for list-based options (Shaders and Filters)
## Use (Shift+i) page 1 to view active vf/af lists, and page 2 for glsl/hook lists
## Shaders and filters can be set to auto-load in mpv.conf instead of manual loading


####################
## Shader List    ##
####################

##⇘⇘ Detailed documentation for third-party shaders: https://hooke007.github.io/unofficial/mpv_shaders.html

## Toggle: KrigBilateral (Slow, high-quality chroma reconstruction, subtle effect)
 Ctrl+1                change-list glsl-shaders toggle "~~/shaders/KrigBilateral.glsl"
## Toggle: AMD_FSR (Fast, upscale to target resolution, includes CAS sharpening)
 Ctrl+2                change-list glsl-shaders toggle "~~/shaders/AMD_FSR.glsl"
## Toggle: RAVUzr3 (Medium speed, upscale to target resolution, slight sharpening)
 Ctrl+3                change-list glsl-shaders toggle "~~/shaders/ravu_zoom_r2_ddx.glsl"
## Toggle: Anime4K_Restore_CNN_M (Fast, no scaling, line reconstruction)
 Ctrl+4                change-list glsl-shaders toggle "~~/shaders/Anime4K_Restore_CNN_M.glsl"
## Toggle: Anime4K_Upscale_GAN_x2_M (Fast, 2x upscale, noticeable effect)
 Ctrl+5                change-list glsl-shaders toggle "~~/shaders/Anime4K_Upscale_GAN_x2_M.glsl"
## Toggle: FSRCNNX8041 (Slow, 2x upscale, faithful to original image)
 Ctrl+6                change-list glsl-shaders toggle "~~/shaders/FSRCNNX_x2_8_0_4_1.glsl"
## Toggle: Adaptive Sharpen (Medium speed, no scaling)
 Ctrl+7                change-list glsl-shaders toggle "~~/shaders/adaptive_sharpen.glsl"
## Toggle: nnedi3_nns64_win8x4 (Very slow, 2x upscale, extremely faithful to original)
 Ctrl+8                change-list glsl-shaders toggle "~~/shaders/nnedi3_nns64_win8x4.glsl"

## Set Combo: Anime4K "DTDD" (Fast, no scaling, Darken+Thin+Denoise+Deblur, strong subjective impact)
 Ctrl+9                change-list glsl-shaders set "~~/shaders/Anime4K_Darken_HQ.glsl;~~/shaders/Anime4K_Thin_HQ.glsl;~~/shaders/Anime4K_Denoise_Bilateral_Mode.glsl;~~/shaders/Anime4K_Deblur_DoG.glsl"
## Set Combo: Dual SSIM (Medium speed, assists built-in algorithms for up/downscaling)
 Ctrl+0                change-list glsl-shaders set "~~/shaders/SSimSuperRes.glsl;~~/shaders/SSimDownscaler.glsl"

## Clear all loaded shaders
 Ctrl+`                change-list glsl-shaders clr "" # Clear Video Shader List



####################
## Filter List    ##
####################

##⇘⇘ Many filters do not support native hardware decoding (hwdec=xxxx). 
## Use hwdec=no or hwdec=xxxx-copy for better compatibility.
## For filter syntax, see https://hooke007.github.io/unofficial/mpv_filters.html

## VapourSynth interpolation scripts (MEMC) - Enable only one at a time
## Toggle: mvtools Interpolation Mode 1 <Shift+1>
 !                    vf toggle vapoursynth="~~/vs/MEMC_MVT_LQ.vpy"        # Toggle mvtools MEMC (Low Quality)
## Toggle: mvtools Interpolation Mode 2 <Shift+2>
 @                    vf toggle vapoursynth="~~/vs/MEMC_MVT_STD.vpy"       # Toggle mvtools MEMC (Standard)
## Toggle: svpflow Interpolation Mode 1 <Shift+3>
 SHARP                vf toggle vapoursynth="~~/vs/MEMC_SVP_LQ.vpy"        # Toggle svpflow MEMC (Low Quality)
## Toggle: svpflow Interpolation Mode 2 <Shift+4>
 $                    vf toggle vapoursynth="~~/vs/MEMC_SVP_PRO.vpy"       # Toggle svpflow MEMC (Pro)
## Toggle: RIFE Interpolation <Shift+5>
 %                    vf toggle vapoursynth="~~/vs/MEMC_RIFE_STD.vpy"      # Toggle RIFE MEMC

## Toggle: Force Limited Color Range (16-235). Fixes incorrect black/white levels in some encodes. <Shift+6>
 ^                    vf toggle format=colorlevels=limited                 # Toggle colorlevels=limited
## Toggle: Add black bars (Pad to 16:9). Useful for 2.35:1 content on 16:9 screens. <Shift+7>
 &                    vf toggle pad=aspect=16/9:x=-1:y=-1                  # Toggle 16:9 Padding (Centered)

## Image Rotation/Flipping <Shift+8> <Shift+9> <Shift+0>
 * vf toggle rotate=angle=180*PI/180                    # Toggle 180° Rotation
 (                    vf toggle vflip                                      # Toggle Vertical Flip
 )                    vf toggle hflip                                      # Toggle Horizontal Flip

## Toggle: Gamma 2.2 Correction. Adjust after color calibration. <Shift+->
 _                    vf toggle format=gamma=gamma2.2                      # Toggle Gamma 2.2

## Toggle: Advanced Deinterlacing <Shift+=>
 +                    vf toggle vapoursynth="~~/vs/ETC_DEINT_EX.vpy"       # Toggle QTGMC Deinterlacing

## Clear all loaded video filters <Shift+`>
 ~                    vf clr "" # Clear Video Filter List
